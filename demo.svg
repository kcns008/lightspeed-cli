<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" rx="8" fill="#1a1a2e"/>
  
  <!-- Title bar -->
  <rect width="800" height="32" rx="8" fill="#16213e"/>
  <rect y="16" width="800" height="16" fill="#16213e"/>
  <circle cx="18" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="16" r="6" fill="#27c93f"/>
  <text x="400" y="20" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">ols — OpenShift Lightspeed CLI</text>
  
  <!-- Session header -->
  <text x="16" y="56" fill="#36d7b7" font-family="monospace" font-size="14" font-weight="bold">OpenShift Lightspeed CLI</text>
  <text x="310" y="56" fill="#888" font-family="monospace" font-size="12">v0.2.0</text>
  <text x="370" y="56" fill="#555" font-family="monospace" font-size="12">[NIM]</text>
  <text x="16" y="76" fill="#555" font-family="monospace" font-size="12">Type your question, or 'quit' to exit.</text>
  
  <!-- Query 1 -->
  <text x="16" y="106" fill="#27c93f" font-family="monospace" font-size="14" font-weight="bold">ols&gt;</text>
  <text x="52" y="106" fill="#ddd" font-family="monospace" font-size="14">how do I scale a deployment?</text>
  
  <!-- Response 1 -->
  <text x="16" y="132" fill="#ddd" font-family="monospace" font-size="13">To scale a deployment in OpenShift:</text>
  <text x="16" y="152" fill="#98c379" font-family="monospace" font-size="13">  oc scale dc/myapp --replicas=3</text>
  <text x="16" y="172" fill="#98c379" font-family="monospace" font-size="13">  oc get pods -l app=myapp</text>
  <text x="16" y="192" fill="#ddd" font-family="monospace" font-size="13">For autoscaling:</text>
  <text x="16" y="212" fill="#98c379" font-family="monospace" font-size="13">  oc autoscale dc/myapp --min=2 --max=10 --cpu-percent=80</text>
  <text x="16" y="232" fill="#555" font-family="monospace" font-size="12">via nim</text>
  
  <!-- Query 2 -->
  <text x="16" y="262" fill="#27c93f" font-family="monospace" font-size="14" font-weight="bold">ols&gt;</text>
  <text x="52" y="262" fill="#ddd" font-family="monospace" font-size="14">ols health</text>
  
  <!-- Health output -->
  <text x="16" y="288" fill="#ddd" font-family="monospace" font-size="13" font-weight="bold">Health Check</text>
  <text x="16" y="308" fill="#ffbd2e" font-family="monospace" font-size="13">  ○</text>
  <text x="36" y="308" fill="#ddd" font-family="monospace" font-size="13">OLS: not configured</text>
  <text x="16" y="328" fill="#27c93f" font-family="monospace" font-size="13">  ✓</text>
  <text x="36" y="328" fill="#ddd" font-family="monospace" font-size="13">NIM: connected (meta/llama-3.1-405b-instruct)</text>
  
  <!-- Query 3 -->
  <text x="16" y="362" fill="#27c93f" font-family="monospace" font-size="14" font-weight="bold">ols&gt;</text>
  <text x="52" y="362" fill="#ddd" font-family="monospace" font-size="14">config show</text>
  
  <!-- Config output -->
  <text x="16" y="388" fill="#ddd" font-family="monospace" font-size="13">{</text>
  <text x="16" y="408" fill="#ddd" font-family="monospace" font-size="13">  "serviceUrl": "",</text>
  <text x="16" y="428" fill="#ddd" font-family="monospace" font-size="13">  "nimApiKey": "nvapi-oZJ...",</text>
  <text x="16" y="448" fill="#ddd" font-family="monospace" font-size="13">  "nimModel": "meta/llama-3.1-405b-instruct"</text>
  <text x="16" y="468" fill="#ddd" font-family="monospace" font-size="13">}</text>
  
  <!-- Cursor blink -->
  <rect x="16" y="484" width="8" height="14" fill="#27c93f" opacity="0.8"/>
</svg>
